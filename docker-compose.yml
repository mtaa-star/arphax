version: '3.9'

services:

  # ── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arphaxtech}
      POSTGRES_USER: ${POSTGRES_USER:-arphaxtech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arphaxtech2025}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arphaxtech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django Backend ────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-this-in-production}
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: postgresql://${POSTGRES_USER:-arphaxtech}:${POSTGRES_PASSWORD:-arphaxtech2025}@db:5432/${POSTGRES_DB:-arphaxtech}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn arphaxtech_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  # ── React Frontend + Admin ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: always

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/app/staticfiles
      - media_files:/app/media
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  # ── SSL Certificates (Let's Encrypt) ─────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    profiles:
      - ssl

volumes:
  postgres_data:
  media_files:
  static_files:
  certbot_certs:
  certbot_www:
